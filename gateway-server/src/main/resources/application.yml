#spring:
#  profiles:
#    active: @profileActive@
server:
  port: 8081

spring:
  application:
    name: gateway-server

  # OAuth2 客户端配置
  security:
    oauth2:
      client:
        registration:
          gateway-client:
            client-id: gateway-client
            client-secret: gateway-secret
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8081/login/oauth2/code/gateway-client
            scope: profile,read,write
            client-name: 网关客户端
            provider: gateway-provider
        provider:
          gateway-provider:
            authorization-uri: http://localhost:8080/oauth2/authorize
            token-uri: http://localhost:8080/oauth2/token
            jwk-set-uri: http://localhost:8080/oauth2/jwks
            user-info-uri: http://localhost:8080/api/users/me
            user-name-attribute: username

      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/oauth2/jwks

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: 6662f928-1f3c-453c-bb2d-083806cdc7d3
        group: domestic-gateway
        username: nacos
        password: nacos

    gateway:
      # 全局配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      # 路由配置
      routes:
        # 订单服务路由
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/order/**
          filters:
            - StripPrefix=0

        # 商品服务路由
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=0

# 日志配置
logging:
  level:
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
